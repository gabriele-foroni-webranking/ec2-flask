
services:
  # Servizio Database MySQL (Perfetto così com'era!)
  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    expose:
      - "3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network

  # Servizio Python / Flask ottimizzato
  web:
    image: python:3.11-slim
    container_name: python_app
    restart: always
    volumes:
      - ./app:/app  # Sincronizza la cartella locale con il container
    working_dir: /app
    # Modificato: Installa le dipendenze SE MANCANO e avvia direttamente Flask sulla porta 8000
    command: sh -c "pip install Flask Flask-SQLAlchemy pymysql cryptography && flask run --host=0.0.0.0 --port=8000"
    ports:
      - "8000:8000"  # Mappa la porta 8000 esterna sulla 8000 interna di Flask
    environment:
      - MYSQL_HOST=${MYSQL_HOST}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - FLASK_APP=app.py         # Dice a Flask qual è il file principale
    depends_on:
      - db
    networks:
      - app-network

volumes:
  mysql_data:

networks:
  app-network:
    driver: bridge