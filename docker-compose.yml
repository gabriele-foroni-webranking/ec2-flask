version: '3.8'

services:
  # Servizio Database MySQL
  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network

  # Servizio Python
  web:
    image: python:3.11-slim
    container_name: python_app
    restart: always
    volumes:
      - ./app:/app
    working_dir: /app
    # Questo comando tiene in piedi il container e simula un'applicazione attiva.
    command: sh -c "pip install mysql-connector-python Flask Flask-SQLAlchemy && tail -f /dev/null"
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
      - DB_USER=${MYSQL_USER}
      - DB_PASSWORD=${MYSQL_PASSWORD}
      - DB_NAME=${MYSQL_DATABASE}
    depends_on:
      - db
    networks:
      - app-network

volumes:
  mysql_data:

networks:
  app-network:
    driver: bridge