name: Test, Build, Push and Deploy

on:
  push:
    branches:
      - prod
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codice
        uses: actions/checkout@v4

      - name: Crea .env per il test
        run: |
          cat <<EOF > .env
          MYSQL_ROOT_PASSWORD=ci_rootpass
          MYSQL_DATABASE=ci_db
          MYSQL_USER=ci_user
          MYSQL_PASSWORD=ci_pass
          MYSQL_HOST=db
          EOF

      - name: Build e avvio container
        run: docker compose up -d --build

      - name: Attendo che l'app risponda
        run: |
          echo "Attendo che http://localhost:8000/ risponda..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/ > /dev/null; then
              echo "App pronta e funzionante!"
              exit 0
            fi
            echo "Tentativo $i/30 non riuscito, riprovo in 3s..."
            sleep 3
          done
          echo "ERRORE: l'app non ha risposto in tempo."
          exit 1

      - name: Mostra log container
        if: always()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      image-tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout codice
        uses: actions/checkout@v4

      - name: Genera tag immagine
        id: tag
        run: |
          echo "tag=$(date +%Y%m%d%H%M%S)-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Configura credenziali AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-north-1

      - name: Login a ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build e push immagine su ECR
        env:
          REGISTRY: ${{ secrets.AWS_ECR_REGISTRY }}
          REPOSITORY: ${{ secrets.AWS_ECR_REPOSITORY }}
          IMAGE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG .
          docker tag $REGISTRY/$REPOSITORY:$IMAGE_TAG $REGISTRY/$REPOSITORY:latest
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$REPOSITORY:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout codice
        uses: actions/checkout@v4

      - name: Configura credenziali AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-north-1

      - name: Login a ECR (per l'EC2)
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Deploy su EC2 via SSM
        env:
          REGISTRY: ${{ secrets.AWS_ECR_REGISTRY }}
          REPOSITORY: ${{ secrets.AWS_ECR_REPOSITORY }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image-tag }}
        run: |
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=instanceids,Values=${{ secrets.EC2_INSTANCE_ID }}" \
            --parameters 'commands=[
              "cd ${{ secrets.EC2_PROJECT_PATH }}",
              "git checkout prod",
              "git pull origin prod",
              "aws ecr get-login-password --region eu-north-1 | docker login --username AWS --password-stdin $REGISTRY",
              "docker pull $REGISTRY/$REPOSITORY:latest",
              "docker compose down",
              "docker compose up -d"
            ]' \
            --timeout-seconds 600 \
            --region eu-north-1