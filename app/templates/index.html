<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestore Chiave-Valore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5" style="max-width: 600px;">
        <h2 class="text-center mb-4">Gestione Chiave-Valore</h2>

        <div class="card card-body shadow-sm mb-4">
            <form action="{{ url_for('aggiungi') }}" method="POST">
                <div class="row g-2">
                    <div class="col-md-5">
                        <input type="text" name="chiave" class="form-control" placeholder="Chiave (es. Colore)" required>
                    </div>
                    <div class="col-md-5">
                        <input type="text" name="valore" class="form-control" placeholder="Valore (es. Blu)" required>
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-primary w-100">Invia</button>
                    </div>
                </div>
            </form>
        </div>

        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white">
                <h5 class="mb-0">Dati nel Database</h5>
            </div>
            <div class="card-body p-0">
                <table class="table table-striped table-hover mb-0">
                    <thead>
                        <tr>
                            <th>Chiave</th>
                            <th>Valore</th>
                            <th class="text-end">Azione</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% if elementi %}
                            {% for elemento in elementi %}
                            <tr>
                                <td class="align-middle"><strong>{{ elemento.chiave }}</strong></td>
                                <td class="align-middle">{{ elemento.valore }}</td>
                                <td class="text-end">
                                    <button class="btn btn-danger btn-sm btn-elimina" data-id="{{ elemento.id }}">Elimina</button>
                                </td>
                            </tr>
                            {% endfor %}
                        {% else %}
                            <tr>
                                <td colspan="3" class="text-center text-muted py-3">Nessun dato presente nel database.</td>
                            </tr>
                        {% endif %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</body>
<script>
document.querySelectorAll('.btn-elimina').forEach(bottone => {
    bottone.addEventListener('click', function() {
        const id = this.getAttribute('data-id');
        
        // Usiamo i backtick ` per evitare conflitti con gli apostrofi italiani
        if (confirm(`Vuoi davvero eliminare questo elemento?`)) {
            fetch('/elimina/' + id, {
                method: 'DELETE'
            }).then(response => {
                if (response.ok) {
                    window.location.reload();
                } else {
                    alert("Errore durante l'eliminazione");
                }
            });
        }
    });
});
</script>
</html>
